# Alembic configuration for the Job Application Co-Pilot.
#
# We don't hard-code the database URL here. migrations/env.py injects it from the
# application's own Settings, so Alembic and the running app always use the same
# database and can't drift apart.

[alembic]
# Location of the migration environment (relative to this file / the backend dir).
script_location = migrations

# Prepend the backend directory to sys.path so ``import app`` resolves when the
# alembic command is run from the backend folder.
prepend_sys_path = .

# Naming template for new migration files: a timestamp + revision id + slug, so
# the versions/ directory sorts chronologically and reads at a glance.
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Use the operating system's native path separator.
version_path_separator = os

# Left blank on purpose: the real URL is set in env.py from app settings.
sqlalchemy.url =


# ---------------------------------------------------------------------------
# Logging configuration (consumed by Python's logging.config.fileConfig).
# ---------------------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
