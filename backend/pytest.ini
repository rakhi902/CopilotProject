# Pytest configuration. Run from the backend/ directory: `python -m pytest`.
[pytest]
testpaths = tests
addopts = -q
# Keep third-party deprecation noise out of a green run.
# These category filters don't catch LangGraph's import-time
# LangChainPendingDeprecationWarning (LangChain prepends a higher-priority filter
# that overrides them); that one is handled in tests/conftest.py.
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
