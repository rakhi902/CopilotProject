# Render Blueprint for the Job Application Co-Pilot (FastAPI backend).
# Spec: https://render.com/docs/blueprint-spec
#
# This file sits at the repository root; the FastAPI backend lives in ./backend,
# so every command starts with `cd backend`. Deploy by pointing a Render Blueprint
# at this repo. Values marked `sync: false` (the LLM key, the CORS origins) are
# secrets set in the Render dashboard, never committed.
services:
  - type: web
    name: job-copilot-api
    runtime: python                 # NOTE: older Render blueprints named this field `env`
    plan: free
    healthCheckPath: /health        # The FastAPI app exposes GET /health

    # 1) Build: install the backend dependencies (incl. psycopg2-binary for PostgreSQL).
    buildCommand: cd backend && pip install -r requirements.txt

    # 2) Pre-deploy: build the PostgreSQL schema before the server boots. Render's
    #    filesystem is ephemeral, so migrations run on every deploy.
    preDeployCommand: cd backend && alembic upgrade head

    # 3) Start: bind to 0.0.0.0 on the port Render injects via $PORT.
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT

    envVars:
      # Managed Postgres URL, injected by Render. It arrives with the legacy
      # `postgres://` scheme, which the app rewrites to `postgresql://` for
      # SQLAlchemy 2.0 (see core/config.normalize_database_url).
      - key: DATABASE_URL
        fromDatabase:
          name: job-copilot-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.10.11"
      - key: ENVIRONMENT
        value: production
      # Let Render generate a strong JWT signing secret automatically.
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: LLM_PROVIDER
        value: groq
      # Secrets / per-environment values, set in the Render dashboard:
      - key: GROQ_API_KEY
        sync: false
      - key: BACKEND_CORS_ORIGINS
        sync: false

databases:
  - name: job-copilot-db
    plan: free
